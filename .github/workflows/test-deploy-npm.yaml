name: Test Deploy NPM

on:
    push:
        branches:
            - ROU-12558

permissions:
    id-token: write
    contents: write
# testing push to npm
jobs:
    call-deploy-npm:
        name: call-deploy-npm
        uses: ./.github/workflows/create-n-deploy-npm.yaml
        with:
            branch-name: main
            delete-branch: true
            run-lint: true
        secrets:
            OSUI_AZURE_CLIENT_ID: ${{ secrets.OSUI_AZURE_CLIENT_ID }}
            OSUI_AZURE_TENANT_ID: ${{ secrets.OSUI_AZURE_TENANT_ID }}
            OSUI_AZURE_SUBSCRIPTION_ID: ${{ secrets.OSUI_AZURE_SUBSCRIPTION_ID }}
    call-deploy-docs:
        name: call-deploy-docs
        needs: call-deploy-npm
        uses: ./.github/workflows/create-n-deploy-docs.yaml
        with:
            branch-name: main
            delete-branch: true
            run-lint: true
        secrets:
            OSUI_AZURE_CLIENT_ID: ${{ secrets.OSUI_AZURE_CLIENT_ID }}
            OSUI_AZURE_TENANT_ID: ${{ secrets.OSUI_AZURE_TENANT_ID }}
            OSUI_AZURE_SUBSCRIPTION_ID: ${{ secrets.OSUI_AZURE_SUBSCRIPTION_ID }}
